<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mantenimiento - Resumen de Consumos</title>
<link rel="manifest" href="manifest.json">

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Excel -->
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

<style>
body{
  font-family:Arial,sans-serif;
  background:#1c2331;
  color:#fff;
  padding:20px;
}
h1{text-align:center;margin-bottom:20px;}

.dashboard{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.card{
  background:#2c3446;
  border-radius:10px;
  padding:20px;
}

.card h2{
  text-align:center;
  border-bottom:2px solid #4caf50;
  padding-bottom:6px;
  margin-bottom:10px;
}

.field{margin-bottom:10px;}
label{font-size:13px;color:#ddd;display:block;margin-bottom:4px;}
input,select{
  width:100%;
  padding:8px;
  border-radius:6px;
  border:none;
}
button{
  width:100%;
  padding:9px;
  border-radius:6px;
  border:none;
  background:#4caf50;
  color:#fff;
  cursor:pointer;
}

/* TOTAL */
.total{
  background:#1f2635;
  padding:8px;
  border-radius:6px;
  text-align:center;
  font-weight:bold;
}

/* COMPARAR */
.compare-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px;
}
.compare-row button{grid-column:1/-1;}

/* MODAL */
#modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.7);
  display:none;
  align-items:center;
  justify-content:center;
}
#modal-content{
  background:#2c3446;
  padding:20px;
  border-radius:10px;
  width:92%;
  max-width:900px;
}

/* MENÚ */
#hamburguesa{
  position:fixed;
  top:15px;
  right:20px;
  font-size:28px;
  cursor:pointer;
  z-index:1100;
}
#menu{
  position:fixed;
  top:0;
  right:0;
  width:260px;
  height:100%;
  background:#2c3446;
  padding:20px;
  box-sizing:border-box;
  transform:translateX(100%);
  transition:.3s;
  z-index:1000;
}
#menu.open{transform:translateX(0);}
#menu h3{text-align:center;margin-bottom:20px;}
button.danger{background:#e53935;}
.service-title{
  display:flex;
  align-items:center;
  gap:8px;
}

.service-icon{
  width:20px;
  height:20px;
  fill:#4caf50;
  flex-shrink:0;
}
/* ===== AJUSTE VISUAL MÓVIL ===== */
@media (max-width: 768px){

  body{
    padding:12px;
  }

  h1{
    font-size:20px;
    margin-bottom:15px;
  }

  .dashboard{
    grid-template-columns:1fr;
    gap:15px;
  }

  .card{
    padding:15px;
  }

  .service-title{
    justify-content:flex-start;
    font-size:16px;
  }

  .service-icon{
    width:18px;
    height:18px;
  }

  .field label{
    font-size:12px;
  }

  input, select{
    padding:10px;
    font-size:14px;
  }

  button{
    padding:12px;
    font-size:14px;
  }

  canvas{
    max-height:220px;
  }

  .compare-row{
    grid-template-columns:1fr;
  }

  .compare-row button{
    font-size:14px;
  }

  .total{
    font-size:14px;
  }

  .compare-summary{
    font-size:14px;
  }

  #menu{
    width:220px;
  }

  #hamburguesa{
    font-size:26px;
    right:15px;
  }

  #modal-content{
    width:96%;
    padding:15px;
  }
}
</style>
</head>

<body>

<div id="hamburguesa" onclick="toggleMenu()">☰</div>

<div id="menu">
  <h3>Menú</h3>
  <button onclick="exportarExcel()">📊 Exportar a Excel</button>
<button onclick="document.getElementById('importExcel').click()">📥 Importar Excel</button>
<input type="file" id="importExcel" accept=".xlsx,.xls" style="display:none" onchange="importarExcel(this.files[0])">
``
  <button class="danger" onclick="borrarTodo()">🗑️ Borrar datos</button>
</div>

<h1>Mantenimiento - Resumen de Consumos</h1>
<div class="dashboard" id="dashboard"></div>

<!-- MODAL -->
<div id="modal">
  <div id="modal-content">
    <h3 id="modal-title"></h3>
    <canvas id="modalChart"></canvas>
    <button onclick="cerrarModal()">Cerrar</button>
  </div>
</div>

<script>
/* ===== SERVICIOS ===== */
const servicios=[
 {
  id:"agua", nombre:"Agua", unidad:"m³",
  icono:`<svg class="service-icon" viewBox="0 0 24 24">
    <path d="M12 2C9 7 5 10 5 15a7 7 0 0014 0c0-5-4-8-7-13z"/>
  </svg>`
 },
 {
  id:"luz", nombre:"Luz", unidad:"kWh",
  icono:`<svg class="service-icon" viewBox="0 0 24 24">
    <path d="M12 2a7 7 0 00-4 12.74V17h8v-2.26A7 7 0 0012 2zM9 21h6v-1H9z"/>
  </svg>`
 },
 {
  id:"diesel", nombre:"Diésel", unidad:"Lts",
  icono:`<svg class="service-icon" viewBox="0 0 24 24">
    <path d="M7 2h10v2H7zm9 4H8a2 2 0 00-2 2v12a2 2 0 002 2h8a2 2 0 002-2V8a2 2 0 00-2-2z"/>
  </svg>`
 },
 {
  id:"gas", nombre:"Gas", unidad:"m³",
  icono:`<svg class="service-icon" viewBox="0 0 24 24">
    <path d="M12 2s4 5 4 9a4 4 0 11-8 0c0-4 4-9 4-9z"/>
  </svg>`
 }
];

const charts={}, hoyISO=()=>new Date().toISOString().split("T")[0];
const mesActual=()=>hoyISO().slice(0,7);
let modalChart=null;
const historial = id =>
  JSON.parse(localStorage.getItem(id + "_historial")) || {};

function nombreMes(ym){
 const [y,m]=ym.split("-");
 const n=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio",
 "Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
 return `${n[m-1]} ${y}`;
}

/* ===== MENU ===== */
function toggleMenu(){
 document.getElementById("menu").classList.toggle("open");
}

/* ===== EXPORTAR ===== */
function exportarExcel(){
 const wb=XLSX.utils.book_new();
 servicios.forEach(s=>{
  const h=historial(s.id);
  const rows=[["Fecha",`Medición (${s.unidad})`]];
  Object.keys(h).sort().forEach(f=>rows.push([f,h[f]]));
  XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(rows),s.nombre);
 });
 XLSX.writeFile(wb,`Consumos_${hoyISO()}.xlsx`);
 toggleMenu();
}

/* ===== BORRAR ===== */
function borrarTodo(){
 if(!confirm("¿Borrar TODOS los datos?"))return;
 servicios.forEach(s=>{
  localStorage.removeItem(s.id+"_historial");
  if(charts[s.id])charts[s.id].destroy();
  renderMesSeleccionado(s.id);
 });
 if(modalChart)modalChart.destroy();
 toggleMenu();
}

/* ===== VISTA ===== */
function cambiarModo(id,modo){
 document.getElementById(id+"_mes").style.display=
  modo==="mes"?"block":"none";
 document.getElementById(id+"_comparar").style.display=
  modo==="comparar"?"block":"none";
 if(modo==="mes")renderMesSeleccionado(id);
}

/* ===== GUARDAR ===== */
function guardarHistorial(id,fecha,valor){
 if(!fecha||valor===""){alert("Completa los campos");return;}
 const h=historial(id);
 h[fecha]=Number(valor);
 localStorage.setItem(id+"_historial",JSON.stringify(h));
 renderMesSeleccionado(id);
}

/* ===== CLICK DERECHO ===== */
function manejarClickDerecho(chart,id,index){
 const fecha=chart.data.labels[index];
 const valor=chart.data.datasets[0].data[index];
 const h=historial(id);
 const a=prompt(`Fecha:${fecha}\nValor:${valor}\nE=Editar B=Borrar`,"E");
 if(!a)return;
 if(a.toUpperCase()==="E"){
  const n=prompt("Nuevo valor:",valor);
  if(n!==null)h[fecha]=Number(n);
 }
 if(a.toUpperCase()==="B"){
  if(confirm("¿Eliminar dato?"))delete h[fecha];
 }
 localStorage.setItem(id+"_historial",JSON.stringify(h));
 renderMesSeleccionado(id);
 if(modalChart)abrirModal(id,servicios.find(s=>s.id===id).nombre);
}

/* ===== MES ===== */
function calcularConsumosPorDiferencia(h, ym) {
  const fechas = Object.keys(h)
    .filter(f => f.startsWith(ym))
    .sort();

  const labels = [];
  const data = [];
  let total = 0;

  for (let i = 0; i < fechas.length; i++) {
    const fecha = fechas[i];
    const actual = h[fecha];
    const anterior = i > 0 ? h[fechas[i - 1]] : null;

    const consumo = anterior !== null ? actual - anterior : 0;

    labels.push(fecha);
    data.push(consumo);
    total += consumo;
  }

  return { labels, data, total };
}
``
function renderMesSeleccionado(id){
  const ym =
    document.getElementById(id + "_mes_sel").value || mesActual();

  const h = historial(id);
  const { labels, data, total } = calcularConsumosPorDiferencia(h, ym);

  document.getElementById(`total_${id}`).textContent =
    `Total del mes: ${total} ${servicios.find(s => s.id === id).unidad}`;

  if (charts[id]) charts[id].destroy();

  charts[id] = new Chart(document.getElementById("graf_" + id), {
    type: "line",
    data: {
      labels,
      datasets: [{
        label: `Consumo diario (${nombreMes(ym)})`,
        data,
        borderColor: "#4caf50",
        pointRadius: 5
      }]
    }
  });

  document.getElementById("graf_" + id).oncontextmenu = e => {
    e.preventDefault();
    const p = charts[id].getElementsAtEventForMode(
      e,
      'nearest',
      { intersect: true },
      true
    );
    if (p.length) manejarClickDerecho(charts[id], id, p[0].index);
  };
}


/* ===== COMPARAR ===== */
function compararMeses(id){
  const m1 = document.getElementById(id+"_m1").value;
  const m2 = document.getElementById(id+"_m2").value;

  if(!m1 || !m2){
    alert("Selecciona ambos meses");
    return;
  }

  const h = historial(id);

  const porDia = mes => {
    const dias = {};
    Object.keys(h).forEach(f=>{
      if(f.startsWith(mes)){
        const dia = f.split("-")[2];
        dias[dia] = h[f];
      }
    });
    return dias;
  };

  const d1 = porDia(m1);
  const d2 = porDia(m2);

  const labels = [...new Set([
    ...Object.keys(d1),
    ...Object.keys(d2)
  ])].sort((a,b)=>a-b);

  const data1 = labels.map(d => d1[d] ?? null);
  const data2 = labels.map(d => d2[d] ?? null);

  if(charts[id]) charts[id].destroy();

  charts[id] = new Chart(document.getElementById("graf_"+id),{
    type:"line",
    data:{
      labels,
      datasets:[
        {
          label: nombreMes(m1),
          data: data1,
          borderColor:"#42a5f5",
          pointRadius:5,
          pointBackgroundColor:"#fff",
          spanGaps:true
        },
        {
          label: nombreMes(m2),
          data: data2,
          borderColor:"#4caf50",
          pointRadius:5,
          pointBackgroundColor:"#fff",
          spanGaps:true
        }
      ]
    }
  });
}

/* ===== MODAL ===== */
function abrirModal(id,nombre){
 if(modalChart)modalChart.destroy();
 modalChart=new Chart(document.getElementById("modalChart"),{
  type:"line",
  data:JSON.parse(JSON.stringify(charts[id].data))
 });
 document.getElementById("modalChart").oncontextmenu=e=>{
  e.preventDefault();
  const p=modalChart.getElementsAtEventForMode(e,'nearest',{intersect:true},true);
  if(p.length)manejarClickDerecho(modalChart,id,p[0].index);
 };
 document.getElementById("modal-title").textContent=nombre;
 document.getElementById("modal").style.display="flex";
}
function cerrarModal(){document.getElementById("modal").style.display="none";}

/* ===== TARJETAS ===== */
function crearFicha(s){
 return `
 <div class="card">
  <h2 class="service-title">${s.icono}<span>${s.nombre}</span></h2>

  <div class="field">
    <label>Vista</label>
    <select onchange="cambiarModo('${s.id}',this.value)">
      <option value="mes">Mes</option>
      <option value="comparar">Comparar meses</option>
    </select>
  </div>

  <div class="field" id="${s.id}_mes">
    <label>Mes</label>
    <input type="month" id="${s.id}_mes_sel" value="${mesActual()}"
      onchange="renderMesSeleccionado('${s.id}')">
  </div>

  <div class="field" id="${s.id}_comparar" style="display:none">
    <label>Comparar meses</label>
    <div class="compare-row">
      <input type="month" id="${s.id}_m1">
      <input type="month" id="${s.id}_m2">
      <button onclick="compararMeses('${s.id}')">Comparar</button>
    </div>
  </div>

  <div class="field">
    <label>Fecha</label>
    <input type="date" id="f_${s.id}" value="${hoyISO()}">
  </div>

  <div class="field">
    <label>Consumo (${s.unidad})</label>
    <input type="number" id="v_${s.id}">
  </div>

  <button onclick="guardarHistorial('${s.id}',f_${s.id}.value,v_${s.id}.value)">Guardar</button>

  <div class="field total" id="total_${s.id}">Total del mes: 0 ${s.unidad}</div>

  <canvas id="graf_${s.id}" onclick="abrirModal('${s.id}','${s.nombre}')"></canvas>
 </div>`;
}

/* ===== INIT ===== */
const dash=document.getElementById("dashboard");
servicios.forEach(s=>{
 dash.insertAdjacentHTML("beforeend",crearFicha(s));
 renderMesSeleccionado(s.id);
});
/* ===== IMPORTAR EXCEL ===== */
function importarExcel(file){
  if(!file) return;

  const reader = new FileReader();
  reader.onload = e => {
    const data = new Uint8Array(e.target.result);
    const workbook = XLSX.read(data, { type: "array" });

    servicios.forEach(s => {
      const sheet = workbook.Sheets[s.nombre];
      if(!sheet) return; // si no existe la hoja, se ignora

      const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });
      if(rows.length < 2) return;

      const h = historial(s.id);

      // empieza desde fila 1 (skip encabezados)
      for(let i = 1; i < rows.length; i++){
        const fecha = rows[i][0];
        const valor = rows[i][1];

        if(!fecha || valor === undefined || valor === "") continue;
        h[fecha] = Number(valor);
      }

      localStorage.setItem(s.id + "_historial", JSON.stringify(h));
      renderMesSeleccionado(s.id);
    });

    alert("✅ Excel importado correctamente");
    toggleMenu();
  };

  reader.readAsArrayBuffer(file);
}

</script>

</body>
</html>
